services:
  - type: web
    name: diva-clone
    env: node
    plan: free
    buildCommand: npm install && npm run build && cd backend && npm install
    startCommand: npm start
    envVars:
      - key: VITE_API_URL
        value: /api
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
